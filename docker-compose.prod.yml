services:
  mongodb:
    image: mongo:7
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS:-root}
    volumes:
      - mongo_data:/data/db
    networks: [stellar]

  localstack:
    image: localstack/localstack:3.8
    restart: always
    environment:
      - SERVICES=s3,ses
      - PERSISTENCE=1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - localstack_data:/var/lib/localstack
    networks: [stellar]

  api:
    build:
      context: ./backend
      target: production
    restart: always
    environment:
      - NODE_ENV=production
      - APP_PORT=3001
      - APP_HOST=0.0.0.0
      - BASE_URL=${BASE_URL:-http://localhost:3001}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - MONGO_URI=mongodb://${MONGO_USER:-root}:${MONGO_PASS:-root}@mongodb:27017/stellarGallery?authSource=admin
      - MONGO_DB_NAME=stellarGallery
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      - BCRYPT_SALT_ROUNDS=12
      - S3_ENDPOINT=${S3_ENDPOINT:-http://localstack:4566}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-test}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-test}
      - S3_BUCKET=${S3_BUCKET:-stellar-gallery}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL:-http://localhost:4566/stellar-gallery}
      - S3_FORCE_PATH_STYLE=true
      - S3_SIGNED_URL_TTL_SECONDS=${S3_SIGNED_URL_TTL_SECONDS:-900}
      - GOOGLE_MOCK_ENABLED=${GOOGLE_MOCK_ENABLED:-true}
      # AWS SES (production: point SES_ENDPOINT to empty/AWS, drop SES_ACCESS_KEY_ID/SES_SECRET_ACCESS_KEY
      # so the default AWS credential provider chain — IAM role / env / ~/.aws — is used.)
      - EMAIL_ENABLED=${EMAIL_ENABLED:-true}
      - EMAIL_FROM=${EMAIL_FROM:-Stellar Gallery <no-reply@stellar-gallery.local>}
      - SES_REGION=${SES_REGION:-us-east-1}
      - SES_ENDPOINT=${SES_ENDPOINT:-http://localstack:4566}
      - SES_ACCESS_KEY_ID=${SES_ACCESS_KEY_ID:-test}
      - SES_SECRET_ACCESS_KEY=${SES_SECRET_ACCESS_KEY:-test}
    ports:
      - "3001:3001"
    depends_on: [mongodb, localstack]
    networks: [stellar]

  web:
    build:
      context: ./frontend
      target: production
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3001/api}
    ports:
      - "3000:3000"
    depends_on: [api]
    networks: [stellar]

volumes:
  mongo_data:
  localstack_data:

networks:
  stellar:
    driver: bridge
