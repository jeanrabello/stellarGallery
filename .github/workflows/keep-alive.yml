name: Keep backend awake

# Paliativo para o cold start do Render free tier: enquanto o serviço não
# resolve o cold start, batemos no /api/health de fora para impedir que ele
# hiberne após ~15 min de inatividade.
#
# Configure a URL base da API em um repo variable (ou secret):
#   Settings > Secrets and variables > Actions > Variables > New
#   Name: BACKEND_URL   Value: https://seu-servico.onrender.com
#
# POR QUE UM LOOP INTERNO, E NÃO SÓ UM PING POR EXECUÇÃO:
# O scheduler do GitHub Actions é best-effort e impontual — mesmo pedindo
# */5, na prática ele dispara a cada 1-2h. Um único ping por execução deixaria
# gaps enormes (> 15 min) e o Render hibernaria mesmo assim. Aqui cada execução
# fica VIVA pingando a cada PING_INTERVAL por ~PING_MINUTES, então UM disparo
# do scheduler já cobre quase uma hora inteira de forma contínua. Assim a
# impontualidade do GitHub deixa de importar.

on:
  schedule:
    # A cada 5 min. Como cada execução cobre ~54 min sozinha, isso é apenas
    # redundância — mesmo que o GitHub só honre um disparo por hora, a
    # cobertura permanece contínua.
    # Obs.: o schedule só dispara quando este arquivo está na branch default.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # permite disparar manualmente pela aba Actions

# Não cancelar execuções em andamento: se dois runs se sobrepuserem, deixá-los
# rodar juntos é inofensivo e evita abrir buraco de cobertura na troca.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # teto de segurança; o loop encerra sozinho antes disso
    env:
      BACKEND_URL: ${{ vars.BACKEND_URL }}
      PING_MINUTES: "54" # duração total do loop nesta execução
      PING_INTERVAL: "240" # segundos entre pings (4 min < janela de 15 min)
    steps:
      - name: Keep-alive loop no /api/health
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::Defina o repo variable BACKEND_URL (Settings > Secrets and variables > Actions > Variables)."
            exit 1
          fi

          URL="${BACKEND_URL%/}/api/health"
          deadline=$(( $(date +%s) + PING_MINUTES * 60 ))
          ok=0
          fail=0

          ping_once() {
            # Render pode levar dezenas de segundos para acordar; até 3
            # tentativas com 90s de timeout cada.
            for attempt in 1 2 3; do
              code=$(curl -sS -o /tmp/body -w "%{http_code}" \
                --connect-timeout 15 --max-time 90 "$URL") \
                && [ "$code" = "200" ] && { echo "$code"; return 0; }
              sleep 10
            done
            echo "${code:-000}"
            return 1
          }

          echo "Loop de keep-alive: ping a cada ${PING_INTERVAL}s por ${PING_MINUTES}min em $URL"
          while :; do
            now=$(date +%s)
            if code=$(ping_once); then
              ok=$((ok + 1))
              echo "$(date -u +%H:%M:%S) HTTP $code ok (acertos=$ok falhas=$fail)"
            else
              fail=$((fail + 1))
              echo "::warning::$(date -u +%H:%M:%S) ping falhou HTTP $code (acertos=$ok falhas=$fail)"
            fi

            # Para antes de dormir se o próximo intervalo passaria do deadline.
            [ $(( now + PING_INTERVAL )) -ge "$deadline" ] && break
            sleep "$PING_INTERVAL"
          done

          echo "Fim do loop. Total: acertos=$ok falhas=$fail"
          # Só falha o job se NENHUM ping funcionou (backend realmente fora).
          if [ "$ok" -eq 0 ]; then
            echo "::error::Nenhum ping retornou 200 — backend inacessível."
            exit 1
          fi
